<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Змейка — мобильная</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #12141c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            flex-direction: column;
            padding: 20px;
            touch-action: none;
        }
        canvas {
            background: #1c1f2f;
            border: 2px solid #ffa502;
            border-radius: 8px;
            display: block;
            max-width: 100%;
            height: auto;
            touch-action: none;
        }
        .info {
            display: flex;
            gap: 30px;
            margin-top: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .score {
            color: #ffa502;
            font-size: 20px;
            font-weight: bold;
        }
        .status {
            color: #ff4757;
            font-size: 28px;
            font-weight: bold;
            min-height: 40px;
            text-align: center;
        }
        .menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(18, 20, 28, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        .menu h1 {
            color: #ffa502;
            font-size: clamp(32px, 8vw, 48px);
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 165, 2, 0.3);
            text-align: center;
        }
        .menu .difficulty {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .menu .difficulty button {
            background: #1c1f2f;
            color: #a4b0be;
            border: 2px solid #ffa502;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
        }
        .menu .difficulty button:hover {
            background: #ffa502;
            color: #12141c;
            transform: scale(1.05);
        }
        .menu .difficulty button.active {
            background: #ffa502;
            color: #12141c;
            box-shadow: 0 0 20px rgba(255, 165, 2, 0.3);
        }
        .menu .start-btn {
            background: #ffa502;
            color: #12141c;
            border: none;
            border-radius: 8px;
            padding: 15px 60px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(255, 165, 2, 0.2);
            margin-top: 10px;
        }
        .menu .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255, 165, 2, 0.4);
        }
        .menu .description {
            color: #a4b0be;
            margin-top: 30px;
            font-size: 14px;
            text-align: center;
        }
        .menu .description span {
            color: #ffa502;
        }
        .game-over-title {
            color: #ff4757;
            font-size: clamp(32px, 8vw, 52px);
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 71, 87, 0.5);
            text-align: center;
        }
        .game-over-score {
            color: #ffa502;
            font-size: 28px;
            margin-bottom: 25px;
            text-align: center;
        }
        .menu .buttons-row {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .menu .buttons-row button {
            background: #1c1f2f;
            color: #a4b0be;
            border: 2px solid #ffa502;
            border-radius: 8px;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .menu .buttons-row button:hover {
            background: #ffa502;
            color: #12141c;
            transform: scale(1.05);
        }
        .menu .buttons-row .retry-btn {
            background: #ffa502;
            color: #12141c;
            border-color: #ffa502;
        }
        .menu .buttons-row .retry-btn:hover {
            background: #ff8c00;
            border-color: #ff8c00;
        }
        .hidden {
            display: none !important;
        }
        .touch-controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            touch-action: none;
        }
        .touch-row {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .touch-btn {
            width: 80px;
            height: 80px;
            font-size: 36px;
            background: #1c1f2f;
            border: 3px solid #ffa502;
            border-radius: 16px;
            color: #ffa502;
            font-weight: bold;
            cursor: pointer;
            touch-action: none;
            transition: 0.1s;
            box-shadow: 0 0 15px rgba(255, 165, 2, 0.15);
        }
        .touch-btn:active {
            background: #ffa502;
            color: #12141c;
            transform: scale(0.9);
            box-shadow: 0 0 30px rgba(255, 165, 2, 0.4);
        }
        .switch-link {
            margin-top: 20px;
        }
        .switch-link a {
            display: inline-block;
            padding: 12px 30px;
            background: #1c1f2f;
            color: #ffa502;
            border: 2px solid #ffa502;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s;
        }
        .switch-link a:hover {
            background: #ffa502;
            color: #12141c;
            transform: scale(1.05);
        }
        .switch-link a:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="menu" id="menu">
        <h1>🐍 Змейка</h1>
        <div class="difficulty">
            <button data-speed="200" class="active">Лёгкий</button>
            <button data-speed="130">Средний</button>
            <button data-speed="80">Сложный</button>
            <button data-speed="40">Хардкор</button>
        </div>
        <button class="start-btn" id="startBtn">▶ СТАРТ</button>
        <div class="description">
            🖐️ Управление — кнопки на экране
        </div>
    </div>
    <div class="menu hidden" id="gameOverMenu">
        <div class="game-over-title">ИГРА ОКОНЧЕНА</div>
        <div class="game-over-score" id="finalScore">Очки: 0</div>
        <div class="buttons-row">
            <button class="retry-btn" id="retryBtn">🔄 Переиграть</button>
        </div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="status" id="status"></div>
    <div class="info">
        <div class="score" id="score">Очки: 0</div>
    </div>
    <div class="touch-controls">
        <div class="touch-row">
            <button class="touch-btn" data-dir="up">▲</button>
        </div>
        <div class="touch-row">
            <button class="touch-btn" data-dir="left">◀</button>
            <button class="touch-btn" data-dir="down">▼</button>
            <button class="touch-btn" data-dir="right">▶</button>
        </div>
    </div>
    <div class="switch-link">
        <a href="index.html">🖥️ Десктопная версия</a>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const scoreDisplay = document.getElementById('score');
        const menu = document.getElementById('menu');
        const gameOverMenu = document.getElementById('gameOverMenu');
        const startBtn = document.getElementById('startBtn');
        const retryBtn = document.getElementById('retryBtn');
        const finalScore = document.getElementById('finalScore');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let snake = [{x: 10, y: 10}];
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let food = {x: 15, y: 10};
        let score = 0;
        let gameOver = false;
        let gameLoop;
        let currentSpeed = 200;
        let gameStarted = false;

        function generateFood() {
            const totalCells = tileCount * tileCount;
            if (snake.length >= totalCells) {
                gameOver = true;
                status.textContent = 'ПОБЕДА!';
                showGameOver();
                return false;
            }
            const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
            const freeCells = [];
            for (let i = 0; i < tileCount; i++) {
                for (let j = 0; j < tileCount; j++) {
                    if (!snakeSet.has(`${i},${j}`)) {
                        freeCells.push({x: i, y: j});
                    }
                }
            }
            if (freeCells.length === 0) {
                gameOver = true;
                status.textContent = 'ПОБЕДА!';
                showGameOver();
                return false;
            }
            const randomIndex = Math.floor(Math.random() * freeCells.length);
            food = freeCells[randomIndex];
            return true;
        }

        function showGameOver() {
            finalScore.textContent = 'Очки: ' + score;
            gameOverMenu.classList.remove('hidden');
            if (gameLoop) clearInterval(gameLoop);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00c647';
            for (let i = 0; i < snake.length; i++) {
                const s = snake[i];
                ctx.fillRect(s.x * gridSize, s.y * gridSize, gridSize - 2, gridSize - 2);
            }
            const head = snake[0];
            ctx.fillStyle = '#ffa502';
            ctx.fillRect(head.x * gridSize, head.y * gridSize, gridSize - 2, gridSize - 2);
            ctx.fillStyle = '#ff4757';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function update() {
            if (gameOver || !gameStarted) return;
            direction = nextDirection;
            const head = {...snake[0]};
            head.x += direction.x;
            head.y += direction.y;
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver = true;
                status.textContent = 'ИГРА ОКОНЧЕНА';
                showGameOver();
                return;
            }
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver = true;
                    status.textContent = 'ИГРА ОКОНЧЕНА';
                    showGameOver();
                    return;
                }
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = 'Очки: ' + score;
                const success = generateFood();
                if (!success) {
                    clearInterval(gameLoop);
                }
            } else {
                snake.pop();
            }
        }

        function gameStep() {
            update();
            draw();
        }

        function startGame() {
            if (gameLoop) clearInterval(gameLoop);
            snake = [{x: 10, y: 10}];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            gameOver = false;
            score = 0;
            scoreDisplay.textContent = 'Очки: 0';
            status.textContent = '';
            gameStarted = true;
            menu.classList.add('hidden');
            gameOverMenu.classList.add('hidden');
            generateFood();
            gameLoop = setInterval(gameStep, currentSpeed);
            draw();
        }

        function showMenu() {
            gameStarted = false;
            if (gameLoop) clearInterval(gameLoop);
            menu.classList.remove('hidden');
            gameOverMenu.classList.add('hidden');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            status.textContent = '';
            scoreDisplay.textContent = 'Очки: 0';
        }

        document.querySelectorAll('.touch-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                if (!gameStarted || gameOver) return;
                const dir = this.dataset.dir;
                if (dir === 'up' && direction.y !== 1) { nextDirection = {x: 0, y: -1}; }
                else if (dir === 'down' && direction.y !== -1) { nextDirection = {x: 0, y: 1}; }
                else if (dir === 'left' && direction.x !== 1) { nextDirection = {x: -1, y: 0}; }
                else if (dir === 'right' && direction.x !== -1) { nextDirection = {x: 1, y: 0}; }
            });
        });

        document.querySelectorAll('.menu .difficulty button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.menu .difficulty button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentSpeed = parseInt(this.dataset.speed);
            });
        });

        startBtn.addEventListener('click', startGame);
        retryBtn.addEventListener('click', startGame);
        showMenu();
    </script>
</body>
</html>
