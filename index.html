<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Змейка</title>
    <style>
        body {
            background: #12141c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            flex-direction: column;
        }
        canvas {
            background: #1c1f2f;
            border: 2px solid #ffa502;
            border-radius: 8px;
            display: block;
        }
        .info {
            display: flex;
            gap: 30px;
            margin-top: 15px;
            align-items: center;
        }
        .score {
            color: #ffa502;
            font-size: 20px;
            font-weight: bold;
        }
        .status {
            color: #ff4757;
            font-size: 28px;
            font-weight: bold;
            min-height: 40px;
        }
        .controls {
            color: #a4b0be;
            font-size: 14px;
            margin-top: 10px;
        }
        .difficulty {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .difficulty button {
            background: #1c1f2f;
            color: #a4b0be;
            border: 2px solid #ffa502;
            border-radius: 6px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .difficulty button:hover {
            background: #ffa502;
            color: #12141c;
        }
        .difficulty button.active {
            background: #ffa502;
            color: #12141c;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="400"></canvas>
<div class="status" id="status"></div>
<div class="info">
    <div class="score" id="score">Очки: 0</div>
</div>
<div class="difficulty">
    <button data-speed="200" class="active">Лёгкий</button>
    <button data-speed="130">Средний</button>
    <button data-speed="80">Сложный</button>
    <button data-speed="40">Хардкор</button>
</div>
<div class="controls">⬆ ⬇ ⬅ ➡  |  Пробел — перезапуск</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const scoreDisplay = document.getElementById('score');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [{x: 10, y: 10}];
    let direction = {x: 1, y: 0};
    let nextDirection = {x: 1, y: 0};
    let food = {x: 15, y: 10};
    let score = 0;
    let gameOver = false;
    let gameLoop;
    let currentSpeed = 200;

    function generateFood() {
        const totalCells = tileCount * tileCount;
        if (snake.length >= totalCells) {
            gameOver = true;
            status.textContent = 'ПОБЕДА!';
            return false;
        }

        const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
        const freeCells = [];

        for (let i = 0; i < tileCount; i++) {
            for (let j = 0; j < tileCount; j++) {
                if (!snakeSet.has(`${i},${j}`)) {
                    freeCells.push({x: i, y: j});
                }
            }
        }

        if (freeCells.length === 0) {
            gameOver = true;
            status.textContent = 'ПОБЕДА!';
            return false;
        }

        const randomIndex = Math.floor(Math.random() * freeCells.length);
        food = freeCells[randomIndex];
        return true;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#00c647';
        for (let i = 0; i < snake.length; i++) {
            const s = snake[i];
            ctx.fillRect(s.x * gridSize, s.y * gridSize, gridSize - 2, gridSize - 2);
        }

        const head = snake[0];
        ctx.fillStyle = '#ffa502';
        ctx.fillRect(head.x * gridSize, head.y * gridSize, gridSize - 2, gridSize - 2);

        ctx.fillStyle = '#ff4757';
        ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
    }

    function update() {
        if (gameOver) return;

        direction = nextDirection;

        const head = {...snake[0]};
        head.x += direction.x;
        head.y += direction.y;

        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
            gameOver = true;
            status.textContent = 'ИГРА ОКОНЧЕНА';
            return;
        }

        for (let i = 0; i < snake.length; i++) {
            if (snake[i].x === head.x && snake[i].y === head.y) {
                gameOver = true;
                status.textContent = 'ИГРА ОКОНЧЕНА';
                return;
            }
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score += 10;
            scoreDisplay.textContent = 'Очки: ' + score;
            const success = generateFood();
            if (!success) {
                clearInterval(gameLoop);
            }
        } else {
            snake.pop();
        }
    }

    function gameStep() {
        update();
        draw();
    }

    function startGame() {
        if (gameLoop) clearInterval(gameLoop);
        snake = [{x: 10, y: 10}];
        direction = {x: 1, y: 0};
        nextDirection = {x: 1, y: 0};
        gameOver = false;
        score = 0;
        scoreDisplay.textContent = 'Очки: 0';
        status.textContent = '';
        generateFood();
        gameLoop = setInterval(gameStep, currentSpeed);
        draw();
    }

    document.addEventListener('keydown', (e) => {
        const key = e.key;
        if (key === ' ') {
            startGame();
            return;
        }

        if (gameOver) return;

        const newDir = {...nextDirection};
        if (key === 'ArrowUp' && direction.y !== 1) { newDir.x = 0; newDir.y = -1; }
        else if (key === 'ArrowDown' && direction.y !== -1) { newDir.x = 0; newDir.y = 1; }
        else if (key === 'ArrowLeft' && direction.x !== 1) { newDir.x = -1; newDir.y = 0; }
        else if (key === 'ArrowRight' && direction.x !== -1) { newDir.x = 1; newDir.y = 0; }
        else return;

        nextDirection = newDir;
    });

    document.querySelectorAll('.difficulty button').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.difficulty button').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentSpeed = parseInt(this.dataset.speed);
            startGame();
        });
    });

    startGame();
</script>

</body>
</html>
